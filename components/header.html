<header role="banner">
  <div class="header-top">
    <div class="container header-content">
      <!-- Logo Section -->
      <a href="/index.html" class="logo-link" aria-label="Black Quant Empire - Startseite">
        <div class="logo-group">
          <img
            src="/assets/images/logo.webp"
            alt="Black Quant Empire Logo: Bulle über Candlestick-Diagramm"
            width="50"
            height="50"
            class="logo-image"
          />
          <div class="logo-text">
            <span class="logo-name">Black Quant Empire</span>
            <span class="logo-tagline">Quantitativer Handel</span>
          </div>
        </div>
      </a>

      <!-- Login Button -->
      <button
        id="login-btn"
        class="login-button"
        aria-label="Login öffnen"
      >
        Login
      </button>

      <!-- Mobile Menu Toggle Button -->
      <button
        class="nav-toggle"
        aria-expanded="false"
        aria-controls="primary-navigation"
        aria-label="Navigationsmenü öffnen"
      >
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>

      <!-- Primary Navigation (Categorized) -->
      <nav id="primary-navigation" aria-label="Primäre Navigation" class="primary-nav">
        <ul role="list" class="nav-list">
          <!-- Main Pages -->
          <li class="nav-item"><a href="/index.html" class="nav-link nav-cta">Startseite</a></li>
          <li class="nav-item"><a href="/about.html" class="nav-link nav-cta">Über uns</a></li>
          <li class="nav-item"><a href="/strategy.html" class="nav-link nav-cta">Strategie</a></li>

          <!-- Careers & Contact -->
          <li class="nav-item"><a href="/careers.html" class="nav-link nav-cta">Karriere</a></li>
          <li class="nav-item"><a href="/contact.html" class="nav-link nav-cta">Kontakt</a></li>
        </ul>
      </nav>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="login-modal" class="login-modal" hidden>
    <div class="login-modal-content">
      <button id="login-close" class="login-modal-close" aria-label="Login schließen">&times;</button>
      <h2>Login</h2>
      <form id="login-form" class="login-form">
        <div class="login-form-group">
          <label for="username">Benutzername</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Benutzername eingeben"
            required
          />
        </div>
        <div class="login-form-group">
          <label for="password">Passwort</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Passwort eingeben"
            required
          />
        </div>
        <button type="submit" class="login-submit">Anmelden</button>
      </form>
    </div>
  </div>
</header>
